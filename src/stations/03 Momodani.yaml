number: 3
name: Momodani
name_kanji: 桃[もも]谷[だに]
description: >-
    Momodani's neighborhood strongly retains the charming Osaka scenery of olden
    days. Home to coffeehouses, penny candy shops and used book stores, this
    neighborhood has an atmosphere of warmth and community.
song: Sake, Tears, Men & Women
verses:
    - ref: 1 Corinthians 12:12
      text: >-
          For just as the body is one and has many members, and all the members
          of the body, though many, are one body, so it is with Christ.
    - ref: John 13:35
      text: >-
          By this all people will know that you are my disciples, if you have
          love for one another.
prayer_points:
    - >-
        Pray for warmth and a sense of community to be found in existing
        Japanese churches.
    - >-
        Pray for the truth of God's Word to inspire healthy cultural changes
        within the old traditions of Japan.
    - >-
        Pray for Believers both Japanese and missionaries as they work to show
        the love of Jesus to others.

number: 10
name: Tenma
name_kanji: 天[てん]満[ま]
description: >-
    The Tenma area is home to the longest shopping street in Japan, over 1.5
    miles. This area began to flourish due to the nearby Shinto shrine where
    people came to worship the god of studies. A festival is held each July with
    fireworks and parades along the street and river.
song: Fireworks
verses:
    - ref: Ephesians 2:12-13
      text: >-
          Remember that you were at that time separated from Christ, ... having
          no hope and without God in the world. But now in Christ Jesus you who
          once were far off have been brought near by the blood of Christ.
prayer_points:
    - >-
        Pray the Japanese would see that materialism and wealth cannot fill the
        God-shaped void in their lives.
    - >-
        There are many vacant buildings throughout the shopping street. Ask that
        God would prepare a place for a church plant.
    - >-
        Pray that the festival near Tenma would be used as an opportunity to
        share Christ rather than idolatrous worship.

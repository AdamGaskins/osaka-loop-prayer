number: 2
name: Teradachō
name_kanji: '寺[てら]田[だ]町[ちょう]'
description: >-
    Teradacho is often used to avoid the larger crowds at Tennoji station.
    Teradacho used to be the last station on this train line, before the line
    was bought and merged with other lines to form the Osaka Loop.
song: Life Goes On
verses:
    - ref: 'Ephesians 3:17-18'
      text: >-
          So that Christ may dwell in your hearts through faith—that you, being
          rooted and grounded in love, may have strength to comprehend with all
          the saints what is the breadth and length and height and depth, and to
          know the love of Christ that surpasses knowledge.
    - ref: 'John 15:5'
      text: >-
          I am the vine; you are the branches. Whoever abides in me and I in
          him, he it is that bears much fruit, for apart from me you can do
          nothing.
prayer_points:
    - >-
        Pray that the "loop" of Buddhism or Shinto would be cut, and a new
        "line" in Japan would rise up as bold Christians within their families
        and culture.
    - >-
        Many Japanese believers feel that reaching their fellow Japanese with
        the gospel is too difficult, even impossible. Pray that they would trust
        in God's plan and be faithful in sharing the gospel.

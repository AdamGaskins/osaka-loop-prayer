number: 14
name: Nishikujō
name_kanji: '西[にし]九[く]条[じょう]'
description: >-
    Nishi-Kujo is the nearest station to the Japan Rail West training facility,
    employing over 47,000 Japanese. Many also transfer here for the popular
    theme park, Universal Studios Japan.
song: American Patrol
verses:
    - ref: 'Psalm 139:14-15'
      text: >-
          I praise you, for I am fearfully and wonderfully made. Wonderful are
          your works; my soul knows it very well. My frame was not hidden from
          you, when I was being made in secret, intricately woven in the depths
          of the earth.
prayer_points:
    - >-
        Intercede for the Japanese as they use amusement and other sources of
        "fun" to numb the pain in their lives.
    - >-
        Pray for the Gospel to work among the train drivers, mechanics, security
        and crews. Pray for their safety.
    - >-
        Ask that God would rescue His creations, fearfully and wonderfully made,
        who are contemplating suicide, specifically involving Japan's railways.

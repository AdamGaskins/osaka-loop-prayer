number: 9
name: Sakuranomiya
name_kanji: 桜[さくら]ノ 宮[みや]
description: >-
    Sakuranomiya literally translates as "Cherry Blossom Palace." The park near
    the station boasts beautiful cherry blossom trees and is a popular spot for
    picnickers, runners, and those who enjoy nature.
song: Sakura
verses:
    - ref: Acts 26:18
      text: >-
          So that they may turn from darkness to light and from the power of
          satan to God, that they may receive forgiveness of sins and a place
          among those who are sanctified by faith in me.
    - ref: Luke 14:22-23
      text: >-
          And the servant said, 'Sir, what you commanded has been done, and
          still there is room.' And the master said to the servant, 'Go out to
          the highways and hedges and compel people to come in, that my house
          may be filled.'
prayer_points:
    - Ask God to use the beauty in nature to reveal Himself to those in Japan.
    - >-
        Pray that God's love would be shown to the homeless, elderly and poor
        who live near this area.
    - >-
        Pray that Sakuranomiya park could be used in outreach and ministry to
        reach many Japanese with the Gospel.

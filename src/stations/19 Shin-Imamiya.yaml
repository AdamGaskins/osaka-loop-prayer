number: 19
name: Shin-Imamiya
name_kanji: 新[しん]今[いま]宮[みや]
description: >-
    This area is sadly "home" to many homeless, outcasts and victims of
    overwhelming cultural pressures. Each year, the nearby Ebisu Shrine hosts a
    festival in which Osaka business owners pray to the gods of commerce and
    prosperity.
song: New World
verses:
    - ref: John 6:51
      text: >-
          I am the living bread that came down from heaven. If anyone eats of
          this bread, he will live forever.
    - ref: Luke 12:33
      text: >-
          Sell your possessions, and give to the needy. Provide yourselves with
          moneybags that do not grow old, with a treasure in the heavens that
          does not fail, where no thief approaches and no moth destroys.
prayer_points:
    - >-
        Pray for the homeless, hungry and outcast of Japan to be satisifed
        through the living bread of Christ.
    - >-
        Pray that God would cultivate a "new world" in the culture of Japan
        defined by His grace and love rather than society's expectations.
    - >-
        Ask that Japanese Christians would become more willing to reach out to
        those on the outskirts to share the love of Christ.

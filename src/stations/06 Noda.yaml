name: Noda
name_kanji: '野[の]田[だ]'
description: >-
    The majority of Osaka's food supply comes through Noda's Central Wholesale
    Market. Each morning at 4:15am, the market holds a special auction for the
    freshest tuna. Unlike most retail businesses, Osaka's Central market is
    closed on Sundays.
song: Russian Folk Song
verses:
    - ref: 'Mark 8:35-36'
      text: >-
          For whoever would save his life will lose it, but whoever loses his
          life for my sake and the gospel's will save it. For what does it
          profit a man to gain the whole world and forfeit his soul?
prayer_points:
    - >-
        Pray for businesses to be more flexible concerning their working hours
        so that their employees can attend church.
    - >-
        Just as Jesus used fish and food to reach many, ask that He would use
        the area of Noda and God's creation to reach many for His Kingdom.

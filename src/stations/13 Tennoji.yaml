name: Tennōji
name_kanji: '天[てん]王[おう]寺[じ]'
description: >-
    Tennoji is home to Abeno Harukas, one of the tallest buildings in Japan.
    Shitennoji Temple is also located nearby, known for the bells which are rung
    throughout the temple grounds. Numbered tickets are often given for entry
    due to the crowds.
song: Are You to Ring that Bell
verses:
    - ref: 'Mark 4:19-20'
      text: >-
          But the cares of the world and the deceitfulness of riches and the
          desires for other things enter in and choke the word, and it proves
          unfruitful. But those that were sown on the good soil are the ones who
          hear the word and accept it and bear fruit.
    - ref: 'Philippians 1:27'
      text: >-
          I may hear of you that you are standing firm in one spirit, with one
          mind striving side by side for the faith of the gospel.
prayer_points:
    - >-
        Among all of the aesthetically pleasing buildings and urban shine, pray
        that the seeds of the Gospel would not get choked out by the thorns of
        life.
    - >-
        Pray that the truth of the Bible would be something all Japanese people
        long to hear and learn about.
    - >-
        Ask that the churches near Tennoji would be faithful to sow the seeds of
        the Gospel in truth and love.

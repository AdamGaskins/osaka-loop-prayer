number: 12
name: Fukushima
name_kanji: '福[ふく]島[しま]'
description: >-
    Fukushima boasts streets upon streets full of quaint restaurants, providing
    a much quieter alternative to the bustling city center nearby. This area is
    a mix of old and new; alleyways packed with tiny, traditional restaurants
    are nestled right next to modern apartments and cafes.
song: Dream Flower
verses:
    - ref: 'Isaiah 43:19'
      text: >-
          Behold, I am doing a new thing; now it springs forth, do you not
          perceive it? I will make a way in the wilderness and rivers in the
          desert.
prayer_points:
    - >-
        Pray that as gospel conversations are had over meals, the Holy Spirit
        would open eyes and ears to receive.
    - >-
        Pray for Japanese believers who gather and eat, that they would be iron
        sharpening iron.

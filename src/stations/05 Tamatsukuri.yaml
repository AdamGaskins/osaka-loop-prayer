number: 5
name: Tamatsukuri
name_kanji: 玉[たま]造[つくり]
description: >-
    "Tamatsukuri" literally means "jewelry making," as this area was a center
    for making talismans in ancient times. These talismans were made of jade and
    quartz and were used for good fortune and protection from evil. At a nearby
    shrine, some of these talismans are still on display.
song: Mary Had a Little Lamb
verses:
    - ref: Psalm 115:4,8
      text: >-
          Their idols are silver and gold, the work of human hands. ... Those
          who make them become like them; so do all who trust in them.
    - ref: Psalm 78:4
      text: >-
          We will not hide them from their children, but tell to the coming
          generation the glorious deeds of the Lord, and his might, and the
          wonders that he has done.
prayer_points:
    - >-
        Pray the Japanese would see the emptiness of their idol worship and turn
        to the one true God.
    - >-
        Pray the children in Japan would have early exposure to the gospel,
        leading to waves of new believers.

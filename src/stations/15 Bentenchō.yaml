number: 15
name: Bentenchō
name_kanji: 弁[べん]天[てん]町[ちょう]
description: >-
    The smallest of the stations along the loop line, Bentenchō serves a quiet
    area and provides a transfer to the Chuo Subway Line. Small as it is, still
    over 80,000 people live in this ward of the city, most of whom know nothing
    about the gospel.
song: I've been workin' on the railroad
verses:
    - ref: Micah 5:2
      text: >-
          But you, O Bethlehem Ephrathah, who are too little to be among the
          clans of Judah, from you shall come forth for me one who is to be
          ruler in Israel, whose coming forth is from of old, from ancient days.
    - ref: John 6:51
      text: >-
          I am the living bread that came down from heaven. If anyone eats of
          this bread, he will live forever. And the bread that I will give for
          the life of the world is my flesh.
prayer_points:
    - >-
        Pray that God would raise up a strong Christian leader out of the quiet
        streets of Bentenchō.
    - >-
        Pray that Christians would encounter "persons of peace" who are open to
        talk about the Gospel.

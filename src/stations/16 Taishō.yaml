number: 16
name: Taishō
name_kanji: '大[たい]正[しょう]'
description: >-
    The Taisho area is named after the former Taisho Emperor and the era in
    which Japan became a democratic society. The Osaka Dome, home to Orix
    Buffalo baseball team, is also located here.
song: Okinawa Folk Song
verses:
    - ref: 'John 10:10'
      text: >-
          The thief comes only to steal and kill and destroy. I came that they
          may have life and have it abundantly.
    - ref: 'Ephesians 3:20'
      text: >-
          To him who is able to do far more abundantly than all that we ask or
          think, according to the power at work within us.
prayer_points:
    - >-
        Pray for the Gospel to be shared and churches to be planted among the
        Japanese who are from Okinawa.
    - >-
        Ask that God would bring salvation to Japan so greatly that the Osaka
        Dome could be filled with thousands worshipping His name.
    - >-
        Historically, Japan has been attracted to western culture. Pray that
        they would be taken by the idea of a relationship with God and desire
        abundant life in Him.

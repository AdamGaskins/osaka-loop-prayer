number: 18
name: Imamiya
name_kanji: 今[いま]宮[みや]
description: >-
    Shinto, the native religion of Japan, considers anything related to death as
    unclean and repugnant. Since the people of Imamiya, "leather city" were
    known for crafting leather goods, they also were considered lowly and
    unclean.
song: God of Great Darkness and Fortune
verses:
    - ref: 1 John 1:9
      text: >-
          If we confess our sins, he is faithful and just to forgive us our sins
          and to cleanse us from all unrighteousness.
    - ref: Isaiah 61:1
      text: >-
          He has sent me to bind up the brokenhearted, to proclaim liberty to
          the captives, and the opening of the prison to those who are bound;
prayer_points:
    - >-
        Ask the one true living God to show the Japanese that they can be made
        clean through His son Jesus.
    - >-
        While a classed based society no longer exists in Japan, many still are
        trapped in the cycles of poverty & hopelessness. Pray for all Japanese
        to be set free by the liberty found only in Jesus.
    - >-
        Pray that Japanese people would realize the lack of power of the "gods"
        as they pray and visit shrines and would search something greater.

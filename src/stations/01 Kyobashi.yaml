name: Kyōbashi
name_kanji: '京[きょう]橋[ばし]'
description: >-
    Kyōbashi is one of the city's transportation hubs and entertainment
    districts, mostly catering to Japanese salarymen rather than tourists. Its
    streets are lined with restaurants, bars and pachinko parlors. Inebriated
    businessmen can be seen stumbling home at all hours of the morning.
song: Old McDonald
verses:
    - ref: '2 Corinthians 4:4'
      text: >-
          In their case the god of this world has blinded the minds of the
          unbelievers, to keep them from seeing the light of the gospel of the
          glory of Christ, who is the image of God.
    - ref: 'Psalm 34:8'
      text: >-
          Oh, taste and see that the LORD is good! Blessed is the man who takes
          refuge in him!
prayer_points:
    - >-
        For the salarymen who drown their sadness with alcohol and pachinko:
        Pray that they would taste and see that the Lord is good.
    - >-
        For the owners of the bars and restaurants: Pray that they would come to
        Christ and be lights in their community.
